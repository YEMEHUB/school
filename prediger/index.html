<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>프레디저 카드 검사</title>
<style>
:root{--bg:#faf7ef;--ink:#222;--line:#ded8ca;--purple:#7438d2;--t:#ff4b32;--p:#f5b522;--d:#0868b8;--i:#4d8730;}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;padding:20px}.wrap{max-width:1320px;margin:0 auto}header{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin-bottom:14px}h1{margin:0;font-size:30px}.hint{margin:7px 0 0;color:#555;font-size:15px}.top-actions{display:flex;gap:8px;flex-wrap:wrap}button{font-family:inherit}.action{border:1px solid #cfc7ee;background:#fff;border-radius:999px;padding:10px 15px;font-weight:800;cursor:pointer;color:#5b2eb3}.action.primary{background:#6f3bd7;color:white}.panel{background:white;border:1px solid #eee0d0;border-radius:18px;box-shadow:0 8px 24px rgba(35,30,20,.08);padding:16px;margin-bottom:16px}.status{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center}.bigCount{font-size:34px;font-weight:900;color:var(--purple)}.muted{color:#666}.progress{height:12px;background:#eee9df;border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#7c4be0,#a676ff);transition:.2s}.cards-toolbar{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:12px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid #e0d9cc;background:#fff;border-radius:999px;padding:8px 13px;font-weight:800;color:#444}.tab.on{background:#222;color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:12px}.card{position:relative;border:0;background:transparent;padding:0;cursor:pointer;border-radius:12px;transition:.12s}.card img{width:100%;display:block;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.16)}.card:hover{transform:translateY(-2px)}.card.selected{transform:translateY(-2px)}.card.selected img{outline:4px solid var(--purple);outline-offset:2px}.order{display:none;position:absolute;right:-6px;top:-7px;background:var(--purple);color:#fff;width:30px;height:30px;border-radius:999px;align-items:center;justify-content:center;font-weight:900;box-shadow:0 2px 7px rgba(0,0,0,.25);font-size:14px}.card.selected .order{display:flex}.check{display:none;position:absolute;left:7px;top:7px;background:rgba(255,255,255,.92);color:var(--purple);border-radius:999px;width:24px;height:24px;align-items:center;justify-content:center;font-weight:900}.card.selected .check{display:flex}.selected-area{display:grid;grid-template-columns:1.6fr .9fr;gap:16px}.selected-box{min-height:190px;border:2px dashed #b58dff;border-radius:18px;padding:16px;background:#fffdfa}.selected-title{font-size:18px;font-weight:900;margin-bottom:10px}.selected-strip{display:flex;gap:10px;flex-wrap:wrap}.mini{width:82px;position:relative}.mini img{width:100%;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,.18)}.mini span{position:absolute;right:-5px;top:-5px;background:#6f3bd7;color:#fff;border-radius:999px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}.resultCards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.resultCard{height:295px;border:3px solid;border-radius:0 0 38px 38px;background:#fff;position:relative;overflow:hidden;padding:84px 18px 18px}.resultCard:before{content:"";position:absolute;left:-3px;top:-3px;width:108px;height:78px;border-radius:0 0 70px 0}.resultCard:after{content:"";position:absolute;right:-3px;top:-3px;width:64px;height:76px;background:white;border-left:3px solid;border-bottom:3px solid;border-radius:0 0 0 64px}.resultCard h3{position:absolute;left:24px;top:19px;color:#fff;margin:0;font-size:28px;z-index:2}.resultCard ul{margin:0;padding:0;list-style:none;color:#9b32b8;font-weight:900;font-size:26px;line-height:1.23;text-align:center;word-break:keep-all}.resultCard.t,.resultCard.t:after{border-color:var(--t)}.resultCard.t:before{background:var(--t)}.resultCard.p,.resultCard.p:after{border-color:var(--p)}.resultCard.p:before{background:var(--p)}.resultCard.d,.resultCard.d:after{border-color:var(--d)}.resultCard.d:before{background:var(--d)}.resultCard.i,.resultCard.i:after{border-color:#079b62}.resultCard.i:before{background:var(--i)}.emptyMsg{color:#777;text-align:center;padding:40px 0}.printOnly{display:none}.tableWrap{margin-top:14px;overflow:auto}table{width:100%;border-collapse:collapse;background:#fff}th,td{border:1px solid #ddd;padding:9px;text-align:center}th{background:#f3efff}.reset{color:#999;background:#fff}@media(max-width:900px){.status,.selected-area{grid-template-columns:1fr}.resultCards{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:repeat(auto-fill,minmax(94px,1fr))}}@media(max-width:520px){body{padding:12px}h1{font-size:24px}.resultCards{grid-template-columns:1fr}.resultCard{height:auto;min-height:235px}.resultCard ul{font-size:22px}}@media print{body{background:#fff}.noPrint,.panel.cardsPanel,.selected-box,.top-actions,.hint,.status{display:none!important}.printOnly{display:block}.selected-area{display:block}.resultCards{grid-template-columns:repeat(4,1fr)}.resultCard{height:285px;break-inside:avoid}.panel{box-shadow:none;border:0}}
</style>
</head>
<body>
<div class="wrap">
<header class="noPrint"><div><h1>프레디저 카드 검사</h1><p class="hint">영역은 숨긴 상태로 카드를 고르고, 결과에서만 확인합니다. 13장을 선택해 주세요.</p></div><div class="top-actions"><button class="action" id="shuffleBtn">🔀 랜덤하게 카드 섞기</button><button class="action reset" id="resetBtn">선택 초기화</button><button class="action primary" id="printBtn">결과표 인쇄</button></div></header>
<section class="panel noPrint"><div class="status"><div><div class="muted">선택한 카드</div><span class="bigCount" id="selectedCount">0</span><b> / 13장</b></div><div><div class="progress"><div class="bar" id="bar"></div></div><p class="hint" id="guide">카드에는 영역명이 표시되지 않습니다. 마음에 드는 활동을 골라주세요.</p></div></div></section>
<section class="panel cardsPanel noPrint"><div class="cards-toolbar"><div class="tabs"><button class="tab on">전체 52장</button></div><span class="muted">※ 결과 보기 전까지 영역은 숨김</span></div><div class="grid" id="grid"></div></section>
<section class="panel"><div class="selected-area"><div class="selected-box noPrint"><div class="selected-title">선택한 카드 <span id="selectedSmall">(0/13)</span></div><div class="selected-strip" id="selectedStrip"><div class="emptyMsg">아직 선택한 카드가 없습니다.</div></div></div><div><div class="selected-title">활동지 기록용 결과표</div><div class="resultCards"><div class="resultCard t"><h3>사물</h3><ul id="list-t"></ul></div><div class="resultCard p"><h3>사람</h3><ul id="list-p"></ul></div><div class="resultCard d"><h3>자료</h3><ul id="list-d"></ul></div><div class="resultCard i"><h3>사고</h3><ul id="list-i"></ul></div></div></div></div><div class="tableWrap noPrint"><table><thead><tr><th>선택순서</th><th>카드명</th><th>영역</th></tr></thead><tbody id="resultTable"><tr><td colspan="3">카드를 선택하면 결과가 표시됩니다.</td></tr></tbody></table></div></section>
</div>
<script>
const originalCards = [{"file": "cards/d_간추리기.png", "title": "간추리기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_검토하기.png", "title": "검토하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_계산하기.png", "title": "계산하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_관찰기록하기.png", "title": "관찰기록하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_구분하기.png", "title": "구분하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_단서모으기.png", "title": "단서모으기/탐색하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_분석하기.png", "title": "분석하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_심사하기.png", "title": "심사하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_연구하기.png", "title": "연구하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_예산돈관리하기.png", "title": "예산(돈)관리하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_정리하기분류하기.png", "title": "정리하기/분류하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_편집하기.png", "title": "편집하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/d_확인하기.png", "title": "확인하기", "area": "자료", "areaCode": "d", "areaEn": "Data"}, {"file": "cards/i_글짓기.png", "title": "글짓기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_다르게보기.png", "title": "다르게보기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_문제해결하기.png", "title": "문제해결하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_발명하기.png", "title": "발명하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_발표하기.png", "title": "발표하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_생각결합하기.png", "title": "생각결합하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_설명하기.png", "title": "설명하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_아이디어내기.png", "title": "아이디어내기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_의견주장하기.png", "title": "의견주장하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_의미찾기.png", "title": "의미찾기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_전략작전짜기.png", "title": "전략/작전짜기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_짐작하기.png", "title": "짐작하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/i_홍보하기알리기.png", "title": "홍보하기/알리기", "area": "사고", "areaCode": "i", "areaEn": "Ideas"}, {"file": "cards/p_가르치기.png", "title": "가르치기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_격려하기.png", "title": "격려하기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_도움주기.png", "title": "도움주기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_상담하기.png", "title": "상담하기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_손님모시기.png", "title": "손님모시기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_이끌기.png", "title": "이끌기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_조언충고하기.png", "title": "조언/충고하기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_친구사귀기.png", "title": "친구사귀기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_판매하기.png", "title": "판매하기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_함께일하기.png", "title": "함께일하기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_협상하기.png", "title": "협상하기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_화해시키기.png", "title": "화해시키기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/p_훈련시키기.png", "title": "훈련시키기", "area": "사람", "areaCode": "p", "areaEn": "People"}, {"file": "cards/t_건축하기.png", "title": "건축하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_나르기운송하기.png", "title": "나르기/운송하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_도구이용하기.png", "title": "도구이용하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_만하기.png", "title": "만들기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_수리하기.png", "title": "수리하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_수집하기.png", "title": "수집하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_실험하기.png", "title": "실험하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_이동하기.png", "title": "이동하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_작동하기.png", "title": "작동하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_재료구매하기.png", "title": "재료구매하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_재배하기.png", "title": "재배하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_조립하기.png", "title": "조립하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}, {"file": "cards/t_현장관리하기.png", "title": "현장관리하기", "area": "사물", "areaCode": "t", "areaEn": "Things"}];
let cards=[...originalCards];
let selected=[];
const grid=document.getElementById('grid');
const selectedCount=document.getElementById('selectedCount');
const selectedSmall=document.getElementById('selectedSmall');
const selectedStrip=document.getElementById('selectedStrip');
const bar=document.getElementById('bar');
const guide=document.getElementById('guide');
const resultTable=document.getElementById('resultTable');
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}}
function renderGrid(){grid.innerHTML='';cards.forEach((c)=>{const b=document.createElement('button');b.className='card'; if(selected.includes(c.file)) b.classList.add('selected'); b.title=c.title; b.innerHTML=`<img src="${c.file}" alt="${c.title}"><span class="check">✓</span><span class="order">${selected.indexOf(c.file)+1}</span>`; b.onclick=()=>toggle(c.file); grid.appendChild(b);});}
function toggle(file){const idx=selected.indexOf(file); if(idx>-1){selected.splice(idx,1)} else {if(selected.length>=13){alert('13장까지 선택할 수 있어요.');return} selected.push(file)} update();}
function byFile(file){return originalCards.find(c=>c.file===file)}
function update(){selectedCount.textContent=selected.length;selectedSmall.textContent=`(${selected.length}/13)`;bar.style.width=(selected.length/13*100)+'%';guide.textContent=selected.length===13?'13장을 모두 선택했습니다. 아래 결과표를 활동지에 적으면 됩니다.':'카드에는 영역명이 표시되지 않습니다. 마음에 드는 활동을 골라주세요.';renderGrid();renderSelected();renderResults();}
function renderSelected(){selectedStrip.innerHTML=''; if(!selected.length){selectedStrip.innerHTML='<div class="emptyMsg">아직 선택한 카드가 없습니다.</div>'; return} selected.forEach((f,i)=>{const c=byFile(f); const div=document.createElement('div'); div.className='mini'; div.innerHTML=`<img src="${c.file}" alt="${c.title}"><span>${i+1}</span>`; selectedStrip.appendChild(div);});}
function renderResults(){const groups={t:[],p:[],d:[],i:[]}; selected.map(byFile).forEach(c=>groups[c.areaCode].push(c.title)); ['t','p','d','i'].forEach(k=>{const ul=document.getElementById('list-'+k); ul.innerHTML=groups[k].length?groups[k].map(x=>`<li>${x}</li>`).join(''):'<li style="color:#ccc;font-size:20px">-</li>';}); if(!selected.length){resultTable.innerHTML='<tr><td colspan="3">카드를 선택하면 결과가 표시됩니다.</td></tr>';return} resultTable.innerHTML=selected.map((f,i)=>{const c=byFile(f);return `<tr><td>${i+1}</td><td>${c.title}</td><td>${c.area}</td></tr>`}).join('');}
document.getElementById('shuffleBtn').onclick=()=>{shuffle(cards);renderGrid();};
document.getElementById('resetBtn').onclick=()=>{if(confirm('선택한 카드를 모두 지울까요?')){selected=[];update();}};
document.getElementById('printBtn').onclick=()=>window.print();
shuffle(cards);update();
</script>
</body>
</html>
