<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>프레디저 카드 검사</title>
<style>
  :root {
    --bg:#fbfaf5; --ink:#202124; --muted:#6b7280; --line:#e5e7eb; --purple:#7c3aed;
    --thing:#ff4b31; --people:#f8b51d; --data:#0967b9; --idea:#0a9a66;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  .app{max-width:1180px;margin:0 auto;padding:14px 12px 60px}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
  h1{font-size:1.45rem;margin:0 0 5px;font-weight:900;letter-spacing:-.04em}
  .hint{margin:0;color:#4b5563;font-size:.92rem;line-height:1.45;word-break:keep-all}
  .top-actions{position:sticky;top:0;z-index:20;background:rgba(251,250,245,.92);backdrop-filter:blur(8px);padding:8px 0 10px;border-bottom:1px solid rgba(229,231,235,.9);margin-bottom:12px}
  .status-row{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .count-pill{background:white;border:1px solid var(--line);box-shadow:0 4px 16px rgba(0,0,0,.06);border-radius:999px;padding:8px 13px;font-weight:900;white-space:nowrap}
  .count-pill strong{color:var(--purple);font-size:1.15rem}
  button{font-family:inherit}
  .btn{border:0;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;box-shadow:0 5px 16px rgba(0,0,0,.08)}
  .shuffle{background:#fff;color:#4c1d95;border:1px solid #ddd6fe}
  .reset{background:#fff;color:#777;border:1px solid #e5e7eb}
  .result-btn{background:var(--purple);color:#fff}
  .result-btn:disabled{background:#d1d5db;color:#fff;cursor:not-allowed;box-shadow:none}
  .action-buttons{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end}

  .panel{background:white;border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 30px rgba(15,23,42,.06);padding:12px;margin-bottom:14px}
  .section-title{font-size:1rem;margin:0 0 10px;font-weight:900;letter-spacing:-.03em}
  .card-grid{display:grid;grid-template-columns:repeat(4, minmax(0,1fr));gap:9px}
  .card{position:relative;border:2px solid transparent;background:#fff;border-radius:10px;padding:4px;box-shadow:0 3px 9px rgba(15,23,42,.12);cursor:pointer;transition:.15s transform,.15s box-shadow,.15s opacity,.15s border-color}
  .card:hover{transform:translateY(-2px)}
  .card img{display:block;width:100%;height:auto;border-radius:6px}
  .card.selected{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.18),0 8px 16px rgba(15,23,42,.18)}
  .card.selected img{filter:brightness(.78)}
  .order-badge{display:none;position:absolute;right:-7px;top:-7px;width:28px;height:28px;border-radius:50%;background:var(--purple);color:#fff;font-size:.9rem;font-weight:900;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.25)}
  .check{display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.92);color:var(--purple);font-size:1.7rem;font-weight:1000;align-items:center;justify-content:center}
  .card.selected .order-badge,.card.selected .check{display:flex}

  .results{display:none}
  .results.show{display:block}
  .result-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
  .back-btn{background:#fff;border:1px solid #ddd6fe;color:#5b21b6;border-radius:999px;padding:8px 12px;font-weight:900;cursor:pointer}
  .worksheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .area-card{min-height:220px;border:2.5px solid;border-radius:0 0 34px 34px;background:#fff;position:relative;overflow:hidden;padding:72px 14px 18px}
  .area-card::before{content:"";position:absolute;left:0;top:0;width:54%;height:62px;border-bottom-right-radius:70px;background:var(--c)}
  .area-card::after{content:"";position:absolute;right:-4px;top:-4px;width:70px;height:80px;border-left:3px solid var(--c);border-bottom:3px solid var(--c);border-radius:0 0 0 70px;background:white}
  .area-title{position:absolute;left:18px;top:17px;z-index:2;color:white;font-size:1.35rem;font-weight:1000}
  .area-card.thing{--c:var(--thing);border-color:var(--thing)}
  .area-card.people{--c:var(--people);border-color:var(--people)}
  .area-card.data{--c:var(--data);border-color:var(--data)}
  .area-card.idea{--c:var(--idea);border-color:var(--idea)}
  .area-list{list-style:none;margin:0;padding:0;color:#a12bc0;font-weight:900;font-size:1.45rem;line-height:1.18;letter-spacing:-.06em;word-break:keep-all}
  .area-list li{margin:0 0 6px}
  .empty{color:#c4b5fd;font-size:1rem;font-weight:700}
  .selected-wrap{border:2px dashed #c4b5fd;border-radius:16px;background:#fff;padding:12px}
  .selected-grid{display:grid;grid-template-columns:repeat(7, minmax(0,1fr));gap:9px}
  .selected-mini{position:relative;border-radius:9px;background:#fff;padding:3px;box-shadow:0 3px 8px rgba(0,0,0,.15)}
  .selected-mini img{width:100%;display:block;border-radius:5px}
  .mini-badge{position:absolute;right:-5px;top:-7px;width:24px;height:24px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem}

  .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111827;color:white;border-radius:999px;padding:10px 15px;font-weight:800;font-size:.9rem;opacity:0;pointer-events:none;transition:.2s;z-index:100}
  .toast.show{opacity:1}

  @media (min-width:720px){.card-grid{grid-template-columns:repeat(7,1fr)}}
  @media (min-width:980px){.card-grid{grid-template-columns:repeat(10,1fr)}}
  @media (max-width:760px){
    .app{padding:10px 8px 50px} h1{font-size:1.25rem} .hint{font-size:.82rem}
    header{display:block} .status-row{align-items:flex-start} .action-buttons{gap:5px}
    .btn{padding:9px 10px;font-size:.82rem} .count-pill{padding:8px 10px;font-size:.88rem}
    .panel{padding:9px;border-radius:14px}
    .card-grid{grid-template-columns:repeat(3, minmax(0,1fr));gap:7px}
    .worksheet-grid{grid-template-columns:1fr;gap:10px}
    .area-card{min-height:150px;border-radius:0 0 28px 28px;padding:64px 18px 14px}
    .area-card::before{height:54px;width:46%} .area-card::after{width:62px;height:70px}
    .area-title{font-size:1.2rem;top:14px}
    .area-list{font-size:1.32rem;line-height:1.22;columns:2;column-gap:18px}
    .selected-grid{grid-template-columns:repeat(4,1fr);gap:8px}
    .result-head{align-items:flex-start;flex-direction:column}
  }
  @media (max-width:380px){.card-grid{grid-template-columns:repeat(2,1fr)} .selected-grid{grid-template-columns:repeat(3,1fr)} .area-list{columns:1}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>프레디저 카드 검사</h1>
      <p class="hint">영역은 보이지 않습니다. 마음에 드는 활동 카드 13장을 선택해 주세요.</p>
    </div>
  </header>

  <div class="top-actions">
    <div class="status-row">
      <div class="count-pill">선택 <strong id="count">0</strong> / 13장</div>
      <div class="action-buttons">
        <button class="btn shuffle" id="shuffleBtn">랜덤하게 카드 섞기</button>
        <button class="btn reset" id="resetBtn">초기화</button>
        <button class="btn result-btn" id="resultBtn" disabled>결과 보기</button>
      </div>
    </div>
  </div>

  <section class="panel" id="selectPanel">
    <h2 class="section-title">카드 선택</h2>
    <div class="card-grid" id="cardGrid"></div>
  </section>

  <section class="panel results" id="resultPanel">
    <div class="result-head">
      <div>
        <h2 class="section-title" style="margin-bottom:3px">활동지 기록용 결과</h2>
        <p class="hint">아래 영역별 목록을 활동지에 옮겨 적으면 됩니다.</p>
      </div>
      <button class="back-btn" id="backBtn">← 다시 선택하기</button>
    </div>
    <div class="worksheet-grid" id="worksheetGrid"></div>
    <div class="selected-wrap">
      <h2 class="section-title">선택한 카드 <span id="selectedTitleCount">0/13</span></h2>
      <div class="selected-grid" id="selectedGrid"></div>
    </div>
  </section>
</div>
<div class="toast" id="toast">13장까지 선택할 수 있어요.</div>
<script>
const CARDS = [{"file": "cards/d_간추리기.png", "title": "간추리기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_검토하기.png", "title": "검토하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_계산하기.png", "title": "계산하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_관찰기록하기.png", "title": "관찰기록하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_구분하기.png", "title": "구분하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_단서모으기.png", "title": "단서모으기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_분석하기.png", "title": "분석하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_심사하기.png", "title": "심사하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_연구하기.png", "title": "연구하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_예산돈관리하기.png", "title": "예산돈관리하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_정리하기분류하기.png", "title": "정리하기분류하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_편집하기.png", "title": "편집하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/d_확인하기.png", "title": "확인하기", "area": "자료", "areaCode": "d", "areaEn": "Data", "areaClass": "data"}, {"file": "cards/i_글짓기.png", "title": "글짓기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_다르게보기.png", "title": "다르게보기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_문제해결하기.png", "title": "문제해결하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_발명하기.png", "title": "발명하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_발표하기.png", "title": "발표하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_생각결합하기.png", "title": "생각결합하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_설명하기.png", "title": "설명하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_아이디어내기.png", "title": "아이디어내기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_의견주장하기.png", "title": "의견주장하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_의미찾기.png", "title": "의미찾기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_전략작전짜기.png", "title": "전략작전짜기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_짐작하기.png", "title": "짐작하기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/i_홍보하기알리기.png", "title": "홍보하기알리기", "area": "사고", "areaCode": "i", "areaEn": "Ideas", "areaClass": "idea"}, {"file": "cards/p_가르치기.png", "title": "가르치기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_격려하기.png", "title": "격려하기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_도움주기.png", "title": "도움주기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_상담하기.png", "title": "상담하기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_손님모시기.png", "title": "손님모시기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_이끌기.png", "title": "이끌기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_조언충고하기.png", "title": "조언충고하기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_친구사귀기.png", "title": "친구사귀기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_판매하기.png", "title": "판매하기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_함께일하기.png", "title": "함께일하기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_협상하기.png", "title": "협상하기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_화해시키기.png", "title": "화해시키기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/p_훈련시키기.png", "title": "훈련시키기", "area": "사람", "areaCode": "p", "areaEn": "People", "areaClass": "people"}, {"file": "cards/t_건축하기.png", "title": "건축하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_나르기운송하기.png", "title": "나르기운송하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_도구이용하기.png", "title": "도구이용하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_만하기.png", "title": "만하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_수리하기.png", "title": "수리하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_수집하기.png", "title": "수집하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_실험하기.png", "title": "실험하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_이동하기.png", "title": "이동하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_작동하기.png", "title": "작동하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_재료구매하기.png", "title": "재료구매하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_재배하기.png", "title": "재배하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_조립하기.png", "title": "조립하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}, {"file": "cards/t_현장관리하기.png", "title": "현장관리하기", "area": "사물", "areaCode": "t", "areaEn": "Things", "areaClass": "thing"}];
const AREA_ORDER = ['t','p','d','i'];
const AREA_NAMES = {t:'사물', p:'사람', d:'자료', i:'사고'};
const AREA_CLASSES = {t:'thing', p:'people', d:'data', i:'idea'};
let deck = [...CARDS];
let selected = [];
const cardGrid = document.getElementById('cardGrid');
const count = document.getElementById('count');
const resultBtn = document.getElementById('resultBtn');
const resultPanel = document.getElementById('resultPanel');
const selectPanel = document.getElementById('selectPanel');
const worksheetGrid = document.getElementById('worksheetGrid');
const selectedGrid = document.getElementById('selectedGrid');
const selectedTitleCount = document.getElementById('selectedTitleCount');
const toast = document.getElementById('toast');
function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
}
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1400)}
function renderCards(){
  cardGrid.innerHTML='';
  deck.forEach((card)=>{
    const idx=selected.findIndex(c=>c.file===card.file);
    const btn=document.createElement('button');
    btn.className='card'+(idx>-1?' selected':'');
    btn.setAttribute('aria-label', card.title);
    btn.innerHTML=`<img src="${card.file}" alt="${card.title}"><span class="check">✓</span><span class="order-badge">${idx>-1?idx+1:''}</span>`;
    btn.addEventListener('click',()=>toggleCard(card));
    cardGrid.appendChild(btn);
  });
}
function toggleCard(card){
  const idx=selected.findIndex(c=>c.file===card.file);
  if(idx>-1) selected.splice(idx,1);
  else {
    if(selected.length>=13){showToast('13장까지 선택할 수 있어요.'); return;}
    selected.push(card);
  }
  update();
}
function update(){
  count.textContent=selected.length;
  resultBtn.disabled = selected.length!==13;
  renderCards();
  renderResults();
}
function renderResults(){
  selectedTitleCount.textContent=`${selected.length}/13`;
  worksheetGrid.innerHTML='';
  AREA_ORDER.forEach(code=>{
    const list=selected.filter(c=>c.areaCode===code);
    const box=document.createElement('div');
    box.className='area-card '+AREA_CLASSES[code];
    box.innerHTML=`<div class="area-title">${AREA_NAMES[code]}</div><ul class="area-list">${list.length?list.map(c=>`<li>${c.title}</li>`).join(''):'<li class="empty">선택 없음</li>'}</ul>`;
    worksheetGrid.appendChild(box);
  });
  selectedGrid.innerHTML='';
  selected.forEach((card,i)=>{
    const item=document.createElement('div');
    item.className='selected-mini';
    item.innerHTML=`<img src="${card.file}" alt="${card.title}"><span class="mini-badge">${i+1}</span>`;
    selectedGrid.appendChild(item);
  });
}
document.getElementById('shuffleBtn').addEventListener('click',()=>{shuffleArray(deck);renderCards();showToast('카드를 섞었어요.')});
document.getElementById('resetBtn').addEventListener('click',()=>{selected=[];resultPanel.classList.remove('show');update();window.scrollTo({top:0,behavior:'smooth'})});
resultBtn.addEventListener('click',()=>{resultPanel.classList.add('show');setTimeout(()=>resultPanel.scrollIntoView({behavior:'smooth',block:'start'}),50)});
document.getElementById('backBtn').addEventListener('click',()=>{selectPanel.scrollIntoView({behavior:'smooth',block:'start'})});
shuffleArray(deck);
update();
</script>
</body>
</html>
