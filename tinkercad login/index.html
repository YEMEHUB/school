<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>팅커캐드 로그인 정보</title>
<style>
:root {
  --bg1:#eef2ff; --bg2:#fdf2f8; --card:#ffffff;
  --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  --primary:#2563eb; --primary2:#4f46e5;
}
* { box-sizing:border-box; }
body { margin:0; min-height:100vh; font-family:"Pretendard","Noto Sans KR",system-ui,sans-serif; color:var(--ink); background:linear-gradient(135deg,var(--bg1),var(--bg2)); }
header { position:sticky; top:0; z-index:10; padding:22px 18px 16px; background:rgba(255,255,255,.88); backdrop-filter:blur(12px); border-bottom:1px solid rgba(229,231,235,.9); }
.header-inner { max-width:1180px; margin:auto; }
h1 { margin:0 0 6px; font-size:clamp(24px,4vw,38px); }
.subtitle { margin:0; color:var(--muted); }
.toolbar { max-width:1180px; margin:18px auto 0; display:flex; gap:10px; flex-wrap:wrap; }
.search { flex:1; min-width:240px; padding:13px 15px; border:1px solid var(--line); border-radius:14px; font-size:16px; outline:none; background:#fff; }
.search:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(37,99,235,.12); }
.count { align-self:center; color:var(--muted); font-weight:700; white-space:nowrap; }
main { max-width:1180px; margin:0 auto; padding:24px 18px 54px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:16px; }
.card { background:var(--card); border:1px solid rgba(229,231,235,.95); border-radius:22px; padding:19px; box-shadow:0 12px 28px rgba(31,41,55,.08); transition:transform .18s ease, box-shadow .18s ease; }
.card:hover { transform:translateY(-3px); box-shadow:0 18px 34px rgba(31,41,55,.12); }
.card-top { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:14px; }
.number-title { font-size:23px; font-weight:900; }
.badge { max-width:72%; padding:7px 12px; border-radius:999px; color:#fff; font-weight:900; overflow-wrap:anywhere; text-align:center; background:linear-gradient(135deg,var(--primary),var(--primary2)); }
.row { display:grid; grid-template-columns:78px 1fr auto; align-items:center; gap:8px; min-height:43px; padding:8px 0; border-top:1px dashed var(--line); }
.label { color:var(--muted); font-size:13px; font-weight:800; }
.value { min-width:0; font-family:ui-monospace,SFMono-Regular,Consolas,monospace; overflow-wrap:anywhere; }
.missing { color:#9ca3af; font-family:inherit; }
button { border:0; border-radius:10px; padding:8px 10px; cursor:pointer; font-weight:800; background:#eef2ff; color:#3730a3; }
button:hover { filter:brightness(.96); }
.site-link { display:block; margin-top:15px; border-radius:14px; overflow:hidden; box-shadow:0 5px 14px rgba(0,0,0,.12); transition:transform .15s ease; }
.site-link:hover { transform:scale(1.015); }
.site-link img { display:block; width:100%; height:auto; }
.empty { text-align:center; color:var(--muted); padding:60px 10px; display:none; }
.notice { max-width:1180px; margin:0 auto 18px; padding:12px 14px; border-radius:14px; background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; font-size:14px; }
.toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none; padding:11px 16px; border-radius:999px; color:#fff; background:#111827; font-weight:800; transition:.2s; z-index:50; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
@media (max-width:520px) { .row { grid-template-columns:70px 1fr auto; } .card { padding:16px; } }
@media print { header { position:static; } .toolbar,.notice,button,.toast { display:none!important; } body { background:#fff; } .grid { grid-template-columns:repeat(2,1fr); } .card { box-shadow:none; break-inside:avoid; } }
</style>
</head>

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const count = document.getElementById('count');
const empty = document.getElementById('empty');
const toast = document.getElementById('toast');
function esc(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function display(v) { return v ? esc(v) : '<span class="missing">미입력</span>'; }
function notify(msg='복사했습니다.') { toast.textContent=msg; toast.classList.add('show'); clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>toast.classList.remove('show'),1300); }
async function copyText(text,label) {
  if(!text) return notify(label+' 정보가 없습니다.');
  try { await navigator.clipboard.writeText(text); } catch(e) { const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
  notify(label+' 복사 완료');
}
function render(list) {
  grid.innerHTML=list.map(s=>`
    <article class="card">
      <div class="card-top">
        <div class="number-title">${esc(s.number)}번</div>
        <span class="badge">${display(s.nickname)}</span>
      </div>
      <div class="row"><span class="label">학생코드</span><span class="value">${display(s.studentCode)}</span><button onclick='copyText(${JSON.stringify(s.studentCode)},"학생코드")'>복사</button></div>
      <div class="row"><span class="label">아이디</span><span class="value">${display(s.loginId)}</span><button onclick='copyText(${JSON.stringify(s.loginId)},"아이디")'>복사</button></div>
      <div class="row"><span class="label">비밀번호</span><span class="value">${display(s.password)}</span><button onclick='copyText(${JSON.stringify(s.password)},"비밀번호")'>복사</button></div>
      <a class="site-link" href="https://www.tinkercad.com/" target="_blank" rel="noopener" aria-label="팅커캐드 사이트 열기"><img src="${siteImage}" alt="Autodesk Tinkercad 사이트 열기"></a>
    </article>`).join('');
  count.textContent=`표시 ${list.length}명 / 전체 ${students.length}명`;
  empty.style.display=list.length?'none':'block';
}
search.addEventListener('input',()=>{ const q=search.value.trim().toLowerCase(); const filtered=!q?students:students.filter(s=>[s.number,s.studentCode,s.loginId,s.nickname].some(v=>String(v).toLowerCase().includes(q))); render(filtered); });
render(students);
</script>
